spring:
  application:
    name: code-review-agent
  ai:
    openai:
      base-url: https://api.groq.com/openai
      api-key: ${GROQ_API_KEY}
      chat:
        options:
          model: llama-3.1-8b-instant
          temperature: 0.1
          max-tokens: 512
server:
  port: ${PORT:8080}
logging:
  level:
    com.codereviewer: INFO
    org.bsc.langgraph4j: INFO
    org.springframework.ai: WARN
app:
  github:
    token: ${GITHUB_TOKEN}
  review:
    hitl-enabled: false
    post-to-github: false
